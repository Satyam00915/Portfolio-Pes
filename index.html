<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satyam Upadhyay — MERN Stack Developer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #050508;
      --bg2: #0c0c14;
      --bg3: #12121e;
      --surface: rgba(255, 255, 255, 0.03);
      --surface2: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(255, 255, 255, 0.14);
      --text: #f0f0f8;
      --text2: #9898b8;
      --text3: #5a5a7a;
      --accent: #7c6fff;
      --accent2: #4ecdc4;
      --accent3: #ff6b9d;
      --glow: rgba(124, 111, 255, 0.15);
    }

    .light {
      --bg: #f8f8ff;
      --bg2: #f0f0f8;
      --bg3: #e8e8f0;
      --surface: rgba(0, 0, 0, 0.03);
      --surface2: rgba(0, 0, 0, 0.06);
      --border: rgba(0, 0, 0, 0.08);
      --border2: rgba(0, 0, 0, 0.14);
      --text: #12121e;
      --text2: #4a4a6a;
      --text3: #8a8aaa;
      --accent: #5b4fff;
      --accent2: #3ab8b0;
      --accent3: #e0407a;
      --glow: rgba(91, 79, 255, 0.12);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.4s ease, color 0.4s ease;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 2px;
    }

    .font-display {
      font-family: 'Syne', sans-serif;
    }

    .font-mono {
      font-family: 'DM Mono', monospace;
    }

    /* NOISE OVERLAY */
    .noise::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* GRADIENT ORBS */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(124, 111, 255, 0.12) 0%, transparent 70%);
      top: -100px;
      left: -100px;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(78, 205, 196, 0.08) 0%, transparent 70%);
      top: 40%;
      right: -150px;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 107, 157, 0.07) 0%, transparent 70%);
      bottom: 10%;
      left: 20%;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(5, 5, 8, 0.7);
      border-bottom: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .light .navbar {
      background: rgba(248, 248, 255, 0.75);
    }

    .navbar.scrolled {
      box-shadow: 0 4px 40px rgba(0, 0, 0, 0.3);
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--text2);
      text-decoration: none;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent);
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      width: 100%;
    }

    .theme-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: var(--surface2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .theme-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--glow);
      transform: rotate(20deg);
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }

    .hamburger span {
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all 0.3s;
      display: block;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 7rem 2rem 4rem;
      overflow: hidden;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      max-width: 1100px;
      width: 100%;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .hero-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .hero-tag::before {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--accent);
      display: block;
    }

    .hero-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }

    .hero-name .word-1 {
      color: var(--text);
    }

    .hero-name .word-2 {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-typed {
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      color: var(--text2);
      margin-bottom: 1.5rem;
      height: 28px;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .cursor {
      width: 2px;
      height: 1.1em;
      background: var(--accent);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    .hero-bio {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text2);
      margin-bottom: 2.5rem;
      max-width: 480px;
    }

    .hero-btns {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn-primary {
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, var(--accent), #5b4fff);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 24px rgba(124, 111, 255, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(124, 111, 255, 0.4);
    }

    .btn-outline {
      padding: 0.75rem 2rem;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(10px);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
      background: var(--glow);
    }

    /* AVATAR */
    .hero-avatar-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .avatar-ring {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
      padding: 3px;
      animation: spin-slow 10s linear infinite;
      position: relative;
    }

    @keyframes spin-slow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      overflow: hidden;
    }

    .avatar-initials {
      font-family: 'Syne', sans-serif;
      font-size: 4.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: none;
    }

    .avatar-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      padding: 0.35rem 0.7rem;
      border-radius: 20px;
      font-weight: 500;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(124, 111, 255, 0.4);
    }

    .floating-chip {
      position: absolute;
      background: var(--surface2);
      border: 1px solid var(--border2);
      backdrop-filter: blur(12px);
      border-radius: 10px;
      padding: 0.5rem 0.9rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text2);
      white-space: nowrap;
    }

    .chip-1 {
      top: 20px;
      left: -60px;
      animation: float-1 4s ease-in-out infinite;
    }

    .chip-2 {
      bottom: 40px;
      left: -80px;
      animation: float-2 5s ease-in-out infinite;
    }

    .chip-3 {
      top: 60px;
      right: -70px;
      animation: float-1 4.5s ease-in-out infinite 0.5s;
    }

    @keyframes float-1 {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-10px)
      }
    }

    @keyframes float-2 {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(8px)
      }
    }

    /* SECTIONS */
    section {
      padding: 6rem 2rem;
      position: relative;
      z-index: 1;
    }

    .section-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-label::before {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--accent);
      display: block;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .section-sub {
      font-size: 1rem;
      color: var(--text2);
      line-height: 1.7;
      max-width: 520px;
      margin-bottom: 3.5rem;
    }

    /* DIVIDER */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border2), transparent);
      margin: 0 auto;
      max-width: 1100px;
    }

    /* ABOUT */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }

    .about-text h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      letter-spacing: -0.02em;
    }

    .about-text p {
      color: var(--text2);
      line-height: 1.85;
      margin-bottom: 1rem;
      font-size: 0.97rem;
    }

    .about-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 24px var(--glow);
      transform: translateY(-3px);
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      margin-top: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* SKILLS */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }

    .skill-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      transition: all 0.35s ease;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .skill-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--card-grad, linear-gradient(135deg, rgba(124, 111, 255, 0.05), transparent));
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 14px;
    }

    .skill-card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: var(--card-accent, var(--accent));
    }

    .skill-card:hover::before {
      opacity: 1;
    }

    .skill-card:hover {
      box-shadow: 0 12px 40px -8px var(--card-glow, var(--glow));
    }

    .skill-icon {
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
      display: block;
    }

    .skill-cat {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }

    .skill-items {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .skill-item {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .skill-item::before {
      content: '›';
      color: var(--accent);
      font-size: 0.9rem;
    }

    /* PROJECTS */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .project-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--card-grad);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .project-card:hover {
      transform: translateY(-6px);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.5);
    }

    .project-card:hover::before {
      opacity: 1;
    }

    .project-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--text3);
      letter-spacing: 0.1em;
    }

    .project-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .project-desc {
      font-size: 0.875rem;
      color: var(--text2);
      line-height: 1.7;
      flex: 1;
    }

    .tech-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tech-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--accent);
      background: rgba(124, 111, 255, 0.1);
      border: 1px solid rgba(124, 111, 255, 0.2);
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      letter-spacing: 0.03em;
    }

    .project-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .github-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--text2);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--border2);
      border-radius: 6px;
      transition: all 0.25s;
    }

    .github-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--glow);
    }

    /* EDUCATION */
    .timeline {
      position: relative;
      padding-left: 2rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, var(--accent), var(--border), transparent);
    }

    .timeline-item {
      position: relative;
      margin-bottom: 3rem;
      padding-left: 2rem;
    }

    .timeline-dot {
      position: absolute;
      left: -2.4rem;
      top: 0.25rem;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 3px rgba(124, 111, 255, 0.2);
    }

    .timeline-year {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
    }

    .timeline-degree {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.3rem;
      letter-spacing: -0.02em;
    }

    .timeline-inst {
      font-size: 0.875rem;
      color: var(--text2);
      margin-bottom: 0.5rem;
    }

    .timeline-desc {
      font-size: 0.85rem;
      color: var(--text3);
      line-height: 1.6;
    }

    /* CERTIFICATIONS */
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .cert-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;

    // ─── TYPED HOOK ──────────────────────────────────────────────────────────────
    function useTyped(strings, speed = 70, pause = 1800) {
      const [display, setDisplay] = useState('');
      const [idx, setIdx] = useState(0);
      const [charIdx, setCharIdx] = useState(0);
      const [deleting, setDeleting] = useState(false);

      useEffect(() => {
        const current = strings[idx];
        const delay = deleting ? speed / 2 : charIdx === current.length ? pause : speed;
        const t = setTimeout(() => {
          if (!deleting && charIdx < current.length) {
            setDisplay(current.slice(0, charIdx + 1));
            setCharIdx(c => c + 1);
          } else if (!deleting && charIdx === current.length) {
            setDeleting(true);
          } else if (deleting && charIdx > 0) {
            setDisplay(current.slice(0, charIdx - 1));
            setCharIdx(c => c - 1);
          } else {
            setDeleting(false);
            setIdx(i => (i + 1) % strings.length);
          }
        }, delay);
        return () => clearTimeout(t);
      }, [charIdx, deleting, idx, strings, speed, pause]);

      return display;
    }

    // ─── SCROLL ACTIVE HOOK ──────────────────────────────────────────────────────
    function useScrollActive(ids) {
      const [active, setActive] = useState('home');
      useEffect(() => {
        const handler = () => {
          for (let i = ids.length - 1; i >= 0; i--) {
            const el = document.getElementById(ids[i]);
            if (el && window.scrollY >= el.offsetTop - 150) {
              setActive(ids[i]); break;
            }
          }
        };
        window.addEventListener('scroll', handler, { passive: true });
        return () => window.removeEventListener('scroll', handler);
      }, [ids]);
      return active;
    }

    // ─── SCROLL REVEAL HOOK ──────────────────────────────────────────────────────
    function useReveal() {
      useEffect(() => {
        const els = document.querySelectorAll('.reveal');
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
        }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
        els.forEach(el => obs.observe(el));
        return () => obs.disconnect();
      }, []);
    }

      }, []);

    }

        <section id="projects">
          <div className="section-inner">
            <div className="reveal">
              <div className="section-label">Work</div>
              <div className="section-title">Featured Projects</div>
              <div className="section-sub">
                A selection of full-stack projects — from auth systems to content platforms.
              </div>
            </div>
            <div className="projects-grid">
              {PROJECTS.map((p, i) => (
                <div
                  key={p.id}
                  className={`project-card reveal reveal-delay-${Math.min(i + 1, 4)}`}
                  style={{ '--card-grad': p.grad }}
                >
                  <div className="project-num">PROJECT_{String(p.id).padStart(2, '0')}</div>
                  <div className="project-title">{p.title}</div>
                  <div className="project-desc">{p.desc}</div>
                  <div className="tech-stack">
                    {p.tech.map(t => <span className="tech-tag" key={t}>{t}</span>)}
                  </div>
                  <div className="project-footer">
                    <a href="https://github.com/satyamupadhyay" className="github-btn" target="_blank" rel="noreferrer">
                      ⬡ GitHub
                    </a>
                    <span style={{ fontFamily: "'DM Mono',monospace", fontSize: '0.65rem', color: 'var(--text3)' }}>MERN Stack</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ─── EDUCATION ───────────────────────────────────────────────────────────────
    function Education() {
      return (
        <section id="education" style={{ background: 'var(--bg2)' }}>
          <div className="section-inner">
            <div className="reveal">
              <div className="section-label">Background</div>
              <div className="section-title">Education</div>
              <div className="section-sub">Academic foundation that drives my engineering approach.</div>
            </div>
            <div className="timeline reveal reveal-delay-1" style={{ maxWidth: '640px' }}>
              <div className="timeline-item">
                <div className="timeline-dot" />
                <div className="timeline-year">2023 — 2027</div>
                <div className="timeline-degree">B.Tech in Computer Science & Engineering</div>
                <div className="timeline-inst">Lovely Professional University</div>
                <div className="timeline-desc">
                  Core curriculum covering Data Structures, Algorithms, Operating Systems, Database Management Systems,
                  Computer Networks, and Software Engineering. Strong focus on practical implementation and system design.
                </div>
              </div>
              <div className="timeline-item">
                <div className="timeline-dot" style={{ background: 'var(--accent2)' }} />
                <div className="timeline-year">2020 — 2022</div>
                <div className="timeline-degree">Higher Secondary Education (XII)</div>
                <div className="timeline-inst">CBSE Board — Science (PCM)</div>
                <div className="timeline-desc">
                  Completed senior secondary with Physics, Chemistry, and Mathematics.
                  Developed strong analytical and logical reasoning foundations.
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // ─── CERTIFICATIONS ──────────────────────────────────────────────────────────
    function Certifications() {
      return (
        <section id="certifications">
          <div className="section-inner">
            <div className="reveal">
              <div className="section-label">Credentials</div>
              <div className="section-title">Certifications</div>
              <div className="section-sub">Continuous learning — validated by industry platforms.</div>
            </div>
            <div className="cert-grid">
              {CERTS.map((c, i) => (
                <div className={`cert-card reveal reveal-delay-${Math.min(i % 4 + 1, 4)}`} key={c.title}>
                  <div className="cert-icon-wrap" style={{ background: c.bg }}>{c.icon}</div>
                  <div>
                    <div className="cert-title">{c.title}</div>
                    <div className="cert-issuer">{c.issuer}</div>
                    <div className="cert-year">{c.year}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ─── CONTACT ─────────────────────────────────────────────────────────────────
    function Contact({ showToast }) {
      const [form, setForm] = useState({ name: '', email: '', message: '' });
      const [sending, setSending] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!form.name || !form.email || !form.message) return;
        setSending(true);
        setTimeout(() => {
          setSending(false);
          setForm({ name: '', email: '', message: '' });
          showToast('✅ Message sent! I\'ll get back to you soon.');
        }, 1200);
      };

      return (
        <section id="contact" style={{ background: 'var(--bg2)' }}>
          <div className="section-inner">
            <div className="contact-grid">
              <div className="reveal">
                <div className="section-label">Contact</div>
                <h3 className="section-title" style={{ fontSize: '2.2rem' }}>Let's build<br />something great</h3>
                <p className="section-sub" style={{ marginBottom: '2rem' }}>
                  Open to full-time roles, freelance projects, and interesting collaborations.
                  Drop me a message and let's talk.
                </p>
                <div className="social-links">
                  <a href="https://github.com/Satyam00915" className="social-link" title="GitHub" target="_blank" rel="noreferrer">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" /></svg>
                  </a>
                  <a href="https://linkedin.com/in/satyam0915" className="social-link" title="LinkedIn" target="_blank" rel="noreferrer">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" /></svg>
                  </a>
                  <a href="mailto:satyamupadhyay0915@gmail.com" className="social-link" title="Email" target="_blank" rel="noreferrer">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" /></svg>
                  </a>
                </div>
                <div style={{ marginTop: '2.5rem', padding: '1.5rem', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '14px' }}>
                  <div style={{ fontFamily: "'DM Mono',monospace", fontSize: '0.7rem', color: 'var(--accent)', letterSpacing: '0.05em', textTransform: 'uppercase', marginBottom: '0.75rem' }}>
                    Quick facts
                  </div>
                  {[
                    '📍 India — Remote Friendly',
                    '⏱️ Usually responds within 24h',
                    '💼 Open to full-time & freelance',
                  ].map(f => (
                    <div key={f} style={{ fontSize: '0.875rem', color: 'var(--text2)', padding: '0.3rem 0' }}>{f}</div>
                  ))}
                </div>
              </div>
              <div className="reveal reveal-delay-2">
                <form className="contact-form" onSubmit={handleSubmit} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '16px', padding: '2rem' }}>
                  <div className="form-group">
                    <label className="form-label">Your Name</label>
                    <input className="form-input" placeholder="John Doe" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} required />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Email Address</label>
                    <input className="form-input" type="email" placeholder="hello@example.com" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} required />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Message</label>
                    <textarea className="form-textarea" rows="5" placeholder="Tell me about your project or opportunity..." value={form.message} onChange={e => setForm({ ...form, message: e.target.value })} required />
                  </div>
                  <button type="submit" className="btn-primary" style={{ width: '100%', justifyContent: 'center' }} disabled={sending}>
                    {sending ? '⏳ Sending...' : 'Send Message ↗'}
                  </button>
                </form>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // ─── FOOTER ──────────────────────────────────────────────────────────────────
    function Footer() {
      return (
        <footer className="footer">
          <p>© 2024 Satyam Upadhyay — All rights reserved</p>
          <p>Built with <span className="footer-heart">♥</span> using React + Tailwind</p>
        </footer>
      );
    }

    // ─── LOADER ──────────────────────────────────────────────────────────────────
    function Loader({ done }) {
      return (
        <div className="page-loader" style={{ opacity: done ? 0 : '', pointerEvents: done ? 'none' : '' }}>
          <div className="loader-text">SU.</div>
          <div className="loader-bar-wrap">
            <div className="loader-bar" />
          </div>
          <p style={{ fontFamily: "'DM Mono',monospace", fontSize: '0.7rem', color: 'var(--text3)', letterSpacing: '0.05em', textTransform: 'uppercase', marginTop: '0.25rem' }}>
            Loading portfolio...
          </p>
        </div>
      );
    }

    // ─── TOAST ───────────────────────────────────────────────────────────────────
    function Toast({ msg, visible }) {
      return (
        <div className={`toast ${visible ? 'show' : ''}`}>{msg}</div>
      );
    }

    // ─── APP ─────────────────────────────────────────────────────────────────────
    function App() {
      const [dark, setDark] = useState(() => localStorage.getItem('theme') !== 'light');
      const [loaded, setLoaded] = useState(false);
      const [toast, setToast] = useState({ msg: '', visible: false });

      useEffect(() => {
        document.documentElement.classList.toggle('light', !dark);
        localStorage.setItem('theme', dark ? 'dark' : 'light');
      }, [dark]);

      useEffect(() => {
        const t = setTimeout(() => setLoaded(true), 1400);
        return () => clearTimeout(t);
      }, []);

      useReveal();

      const showToast = useCallback((msg) => {
        setToast({ msg, visible: true });
        setTimeout(() => setToast({ msg: '', visible: false }), 3000);
      }, []);

      return (
        <div className="noise">
          <Loader done={loaded} />
          <div className="orb orb-1" />
          <div className="orb orb-2" />
          <div className="orb orb-3" />
          <Navbar dark={dark} setDark={setDark} />
          <main>
            <Hero />
            <div className="divider" />
            <About />
            <div className="divider" />
            <Skills />
            <div className="divider" />
            <Projects />
            <div className="divider" />
            <Education />
            <div className="divider" />
            <Certifications />
            <div className="divider" />
            <Contact showToast={showToast} />
          </main>
          <Footer />
          <Toast msg={toast.msg} visible={toast.visible} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
